<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Svell - Ritual Generation</title>
    <style>
        body { background: #121212; color: #d4af37; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; border: 1px solid #d4af37; padding: 50px; border-radius: 30px; background: radial-gradient(circle, #222, #111); box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 400px; }
        h1 { font-variant: small-caps; letter-spacing: 6px; margin-bottom: 10px; }
        p { color: #888; font-style: italic; margin-bottom: 30px; }
        
        /* Progress Bar */
        #progressContainer { width: 100%; height: 4px; background: #333; margin: 20px 0; border-radius: 2px; display: none; position: relative; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: #d4af37; transition: width 0.1s linear; box-shadow: 0 0 10px #d4af37; }
        
        button { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 12px 24px; cursor: pointer; font-size: 16px; transition: all 0.3s; border-radius: 5px; font-family: 'Georgia', serif; }
        button:hover { background: #d4af37; color: #121212; }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 13px; color: #666; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1>The Svell</h1>
    <p>Silver-Silk Membranes & Mahogany Wells</p>
    
    <button id="initBtn">Summon the Instrument</button>
    
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
    
    <button id="demoBtn" style="display:none;">Begin Performance</button>
    <div id="status">Awaiting Initiation...</div>
</div>

<script>
/** 
 * SVELL ENGINE 
 */
const SVELL_CONFIG = {
    // Full range of notes needed for the progression (C Major, Am, F Major, G Major)
    notes: [
        261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99
    ],
    layers: {
        ghost: { modIndex: 3, decay: 2.0, gain: 0.2 },
        lyric: { modIndex: 18, decay: 1.2, gain: 0.5 },
        shatter: { modIndex: 50, decay: 0.6, gain: 0.7 }
    },
    sampleLength: 2.5
};

let audioCtx;
let sampleLib = {};
const initBtn = document.getElementById('initBtn');
const demoBtn = document.getElementById('demoBtn');
const progressBar = document.getElementById('progressBar');
const progressContainer = document.getElementById('progressContainer');
const status = document.getElementById('status');

// Core FM Rendering logic
async function bakeSvellNote(freq, layerKey) {
    const settings = SVELL_CONFIG.layers[layerKey];
    const offCtx = new OfflineAudioContext(1, 44100 * SVELL_CONFIG.sampleLength, 44100);

    const carrier = offCtx.createOscillator();
    const modulator = offCtx.createOscillator();
    const modGain = offCtx.createGain();
    const ampEnv = offCtx.createGain();
    const filter = offCtx.createBiquadFilter();

    carrier.type = 'sine';
    carrier.frequency.setValueAtTime(freq, 0);
    modulator.type = 'sine';
    modulator.frequency.setValueAtTime(freq * 1.414, 0); // Membrane Ratio

    modGain.gain.setValueAtTime(settings.modIndex * freq, 0);
    modGain.gain.exponentialRampToValueAtTime(1, SVELL_CONFIG.sampleLength);

    ampEnv.gain.setValueAtTime(0, 0);
    ampEnv.gain.linearRampToValueAtTime(settings.gain, 0.01);
    ampEnv.gain.exponentialRampToValueAtTime(0.001, settings.decay * SVELL_CONFIG.sampleLength);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(3000, 0);
    filter.frequency.exponentialRampToValueAtTime(400, SVELL_CONFIG.sampleLength);

    modulator.connect(modGain);
    modGain.connect(carrier.frequency);
    carrier.connect(filter);
    filter.connect(ampEnv);
    ampEnv.connect(offCtx.destination);

    modulator.start();
    carrier.start();
    return await offCtx.startRendering();
}

initBtn.onclick = async () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    initBtn.style.display = 'none';
    progressContainer.style.display = 'block';
    
    const totalNotes = SVELL_CONFIG.notes.length;
    const layers = Object.keys(SVELL_CONFIG.layers);
    const totalTasks = totalNotes * layers.length;
    let completed = 0;

    // Use a generator to process notes without blocking the UI thread
    const generateSvell = async () => {
        for (let freq of SVELL_CONFIG.notes) {
            sampleLib[freq] = {};
            for (let layer of layers) {
                sampleLib[freq][layer] = await bakeSvellNote(freq, layer);
                completed++;
                
                // Update UI via the animate loop logic
                const percent = (completed / totalTasks) * 100;
                progressBar.style.width = `${percent}%`;
                status.innerText = `Tuning Membrane: ${Math.round(percent)}%`;
                
                // Small pause to let browser breathe/render UI
                await new Promise(r => requestAnimationFrame(r));
            }
        }
    };

    await generateSvell();
    
    status.innerText = "The Svell has been summoned.";
    demoBtn.style.display = 'inline-block';
};

function playSvell(freq, layer, time, duration) {
    const source = audioCtx.createBufferSource();
    source.buffer = sampleLib[freq][layer];
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.4, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
    source.connect(gain);
    gain.connect(audioCtx.destination);
    source.start(time);
}

demoBtn.onclick = () => {
    demoBtn.disabled = true;
    const now = audioCtx.currentTime;
    
    // Progression: C Maj -> A min -> F Maj -> G Maj
    const progression = [
        { notes: [261.63, 329.63, 392.00], expr: 'ghost' },   // C
        { notes: [220.00, 261.63, 329.63], expr: 'lyric' },   // Am (Modified)
        { notes: [174.61, 261.63, 329.63], expr: 'shatter' }, // F
        { notes: [196.00, 293.66, 392.00], expr: 'lyric' },   // G
    ];
    
    // To avoid "out of range" errors, let's map strictly to the generated list
    const availableNotes = SVELL_CONFIG.notes;
    
    // Create a looping arpeggio sequence
    const loopTime = 8; // seconds
    for (let t = 0; t < 32; t += 0.5) { // Run for 4 cycles
        const chordIndex = Math.floor((t / 2) % 4); 
        const chord = progression[chordIndex];
        
        // Pick a random note from the generated list for the arpeggio
        const note = availableNotes[Math.floor(Math.random() * availableNotes.length)];
        
        // Vary expression based on progression step
        let layer = chord.expr;
        if (Math.random() > 0.7) layer = 'shatter'; // Randomly hit a high note
        
        playSvell(note, layer, now + t, 2.0);
    }
    
    status.innerText = "Svell Performing... (Looping)";
};
</script>

</body>
</html>
